# Run a clean production build and verify output on every push to production branches.
# Catches errors like "Cannot find module './vendor-chunks/next.js'" before deploy.
name: Production build verify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify production build (clean build + sanity check)
        run: npm run build:verify

      - name: Lint
        run: npm run lint
